competition_slug: orbit-wars
competition_url: https://www.kaggle.com/competitions/orbit-wars
environment_name: orbit_wars
submission_entry: main.py
agent_function: agent(obs)
action_format: "[[from_planet_id, direction_angle, num_ships], ...]"
